- route:
    id: route-sharepoint-ke-kafka
    from:
      uri: timer:sharepoint
      parameters:
        period: "5000"
        delay: "1000"

      steps:

        - log:
            id: log-mulai-polling
            message: "MEMULAI POLLING DATA SHAREPOINT"

        - setHeader:
            id: set-method-http
            name: CamelHttpMethod
            constant: GET

        - to:
            id: panggil-api-sharepoint
            uri: "http://10.123.45.4:5000/api/v1/primakom/sharepoint"

        - unmarshal:
            id: konversi-json
            json: {}

        - split:
            id: pecah-data-record
            simple: "${body[data]}"
            streaming: true
            steps:

              - log:
                  id: log-proses-id
                  message: "MEMPROSES DATA SHAREPOINT ID ${body[ID]}"

              - choice:
                  id: cek-status-eccas

                  when:
                    - simple: "${body[ECCASApp0]} == 4"
                      steps:

                        - log:
                            id: log-data-valid
                            message: "ECCASApp0 = 4 → CEK DATA DI ithacaDB"

                        - setProperty:
                            id: simpan-dokumen-asli
                            name: originalDoc
                            simple: "${body}"

                        - setHeader:
                            id: buat-query-mongo
                            name: CamelMongoDbCriteria
                            simple: "{ \"_id\": ${body[ID]} }"

                        - to:
                            id: cek-duplikasi-ithaca
                            uri: "mongodb:client?hosts=10.123.45.5:27017&username=root&password=%21asiwmcll32kk489522039481&database=primakom&collection=ithacaDB&operation=findOneByQuery"

                        - choice:
                            id: validasi-duplikasi

                            when:
                              - simple: "${body} == null"
                                steps:

                                  - log:
                                      id: log-bangun-payload
                                      message: "DATA BELUM ADA → MEMBUAT PAYLOAD KAFKA"

                                  - setBody:
                                      id: transformasi-payload-kafka
                                      simple: >
                                        {
                                          "_id": ${exchangeProperty.originalDoc[ID]},
                                          "COMPANYCODE": "${exchangeProperty.originalDoc[Company_x0020_Code]}",
                                          "ASSETCLASS": "${exchangeProperty.originalDoc[Asset_x0020_Class]}",
                                          "DESCRIPT": "${exchangeProperty.originalDoc[Asset_x0020_Description]}",
                                          "COSTCENTER": "${exchangeProperty.originalDoc[Cost_x0020_Center]}",
                                          "PLANT": "${exchangeProperty.originalDoc[Plant]}",
                                          "ULIFE_BOOK": "${exchangeProperty.originalDoc[Use_x0020_of_x0020_Life_x0020__x]}",
                                          "ULIFE_TAX": "${exchangeProperty.originalDoc[Use_x0020_of_x0020_Life_x0020__x0]}",
                                          "ULIFE_IFRS": "${exchangeProperty.originalDoc[Use_x0020_of_x0020_Life_x0020__x1]}"
                                        }

                                  - log:
                                      id: log-kirim-kafka
                                      message: "MENGIRIM DATA KE KAFKA ${body}"

                                  - to:
                                      id: kirim-ke-kafka
                                      uri: "kafka:sharepoint-ithaca-topic?brokers=10.123.45.4:9092"

                            otherwise:
                              steps:

                                - log:
                                    id: log-data-sudah-ada
                                    message: "DATA SUDAH ADA DI ithacaDB → DILEWATI"

                  otherwise:
                    steps:

                      - log:
                          id: log-data-tidak-valid
                          message: "DATA DILEWATI KARENA ECCASApp0 != 4"


- route:
    id: route-kafka-ke-sap
    from:
      uri: "kafka:sharepoint-ithaca-topic?brokers=10.123.45.4:9092"

      steps:

        - log:
            id: log-terima-kafka
            message: "DATA DITERIMA DARI KAFKA ${body}"

        - setProperty:
            id: simpan-payload-asli
            name: originalPayload
            simple: "${body}"

        - setHeader:
            id: buat-query-cek-db
            name: CamelMongoDbCriteria
            simple: "{ \"_id\": ${body[_id]} }"

        - to:
            id: cek-data-ithaca
            uri: "mongodb:client?hosts=10.123.45.5:27017&username=root&password=%21asiwmcll32kk489522039481&database=primakom&collection=ithacaDB&operation=findOneByQuery"

        - choice:
            id: validasi-data-db

            when:
              - simple: "${body} == null"
                steps:

                  - log:
                      id: log-insert-db
                      message: "DATA BELUM ADA → INSERT KE ithacaDB"

                  - setBody:
                      id: kembalikan-payload-asli
                      simple: "${exchangeProperty.originalPayload}"

                  - to:
                      id: insert-ke-ithaca
                      uri: "mongodb:client?hosts=10.123.45.5:27017&username=root&password=%21asiwmcll32kk489522039481&database=primakom&collection=ithacaDB&operation=insert"

                  - setProperty:
                      id: buat-nomor-asset
                      name: assetNumber
                      simple: "${random(10000000,99999999)}"

                  - log:
                      id: log-nomor-asset
                      message: "GENERATE NOMOR ASSET ${exchangeProperty.assetNumber}"

                  - setHeader:
                      id: buat-query-update
                      name: CamelMongoDbCriteria
                      simple: "{ \"_id\": ${exchangeProperty.originalPayload[_id]} }"

                  - setBody:
                      id: buat-payload-update
                      simple: >
                        {
                          "$set": {
                            "Asset_x0020_Number": "${exchangeProperty.assetNumber}"
                          }
                        }

                  - log:
                      id: log-update-primakomSH
                      message: "UPDATE FIELD Asset_x0020_Number DI primakomSH"

                  - to:
                      id: update-primakomSH
                      uri: "mongodb:client?hosts=10.123.45.5:27017&username=root&password=%21asiwmcll32kk489522039481&database=primakom&collection=primakomSH&operation=update"

            otherwise:
              steps:

                - log:
                    id: log-data-sudah-ada-db
                    message: "DATA SUDAH ADA DI ithacaDB → PROSES DIHENTIKAN"